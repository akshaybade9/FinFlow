##################################################
# APPLICATION CONFIGURATION
##################################################

spring.application.name=finflow-customer-service
server.port=8081

##################################################
# EUREKA CLIENT CONFIGURATION
##################################################

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

##################################################
# DATABASE CONFIGURATION
##################################################

spring.datasource.url=jdbc:mysql://localhost:3306/finflow_db
spring.datasource.username=root
spring.datasource.password=Akshay@754
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##################################################
# HIKARI CONNECTION POOL
##################################################

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=FinflowCustomerPool

##################################################
# JPA / HIBERNATE CONFIGURATION
##################################################

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

##################################################
# LIQUIBASE
##################################################

spring.liquibase.enabled=false

##################################################
# JACKSON CONFIG
##################################################

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

##################################################
# ACTUATOR
##################################################

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

##################################################
# LOGGING
##################################################

logging.level.org.springframework=INFO
logging.level.com.finflow=DEBUG